<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Cozinha 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #d4e8f0; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #loading {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    background: #111; color: #ccc; font-size: 14px;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>
<div id="loading">Carregando cozinha 3D…</div>
<div style="position:absolute;top:18px;left:18px;color:#fff;pointer-events:none;font-family:'Segoe UI',sans-serif">
  <div style="font-size:15px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.7)">Projeto Cozinha — Visualização 3D</div>
  <div style="font-size:11px;opacity:.55;margin-top:3px;text-shadow:0 1px 3px rgba(0,0,0,.7)">Arraste para girar · Scroll para zoom</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ---------- Renderer + pipeline de cor ----------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;       // ajuste fino de brilho: 0.9–1.3
renderer.setClearColor(0xeeeae4);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeae4);

// ---------- Environment map (reflexos de inox e mármore) ----------
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// ---------- Câmera nível do olho ----------
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.05, 40);
camera.position.set(0.1, 1.55, 3.6);
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.9, -0.6);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.minDistance = 0.6; controls.maxDistance = 6.5;
controls.maxPolarAngle = Math.PI * 0.492;   // não passa por baixo do chão
controls.update();

// ---------- Texturas PBR ----------
const txLoader = new THREE.TextureLoader();
const maxAniso = renderer.capabilities.getMaxAnisotropy();

function loadTex(path, rx, ry, srgb = false) {
  const t = txLoader.load(path);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(rx, ry);
  t.anisotropy = maxAniso;
  if (srgb) t.colorSpace = THREE.SRGBColorSpace;   // só o color map recebe sRGB
  return t;
}

// Mármore — piso (cada placa ~1m: piso 3.5×4 → repeat 3.5×4)
const flColor  = loadTex('./textures/marble/color.jpg', 3.5, 4, true);
const flNormal = loadTex('./textures/marble/normal.jpg', 3.5, 4);
const flRough  = loadTex('./textures/marble/roughness.jpg', 3.5, 4);
// Mármore — tampos/ilha (veios grandes contínuos)
const tpColor  = loadTex('./textures/marble/color.jpg', 2, 1, true);
const tpNormal = loadTex('./textures/marble/normal.jpg', 2, 1);
const tpRough  = loadTex('./textures/marble/roughness.jpg', 2, 1);
// Subway tile — backsplash (tijolinhos ~20×7cm)
const tlColor  = loadTex('./textures/tile/color.jpg', 6, 5, true);
const tlNormal = loadTex('./textures/tile/normal.jpg', 6, 5);
const tlRough  = loadTex('./textures/tile/roughness.jpg', 6, 5);

// ---------- Materiais ----------
const MAT = {
  armario:  new THREE.MeshStandardMaterial({ color: 0xf4f2ee, roughness: 0.35, metalness: 0.0 }),
  bancada:  new THREE.MeshStandardMaterial({ map: tpColor, normalMap: tpNormal, roughnessMap: tpRough, roughness: 0.15, metalness: 0.0 }),
  ilha:     null,
  piso:     new THREE.MeshStandardMaterial({ map: flColor, normalMap: flNormal, roughnessMap: flRough, roughness: 0.12, metalness: 0.0 }),
  inox:     new THREE.MeshStandardMaterial({ color: 0xb8bcc0, roughness: 0.3, metalness: 0.85 }),
  eletro:   new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.25, metalness: 0.3 }),
  parede:   new THREE.MeshStandardMaterial({ color: 0xf5f4f1, roughness: 0.9, metalness: 0.0 }),
  teto:     new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.95, metalness: 0.0 }),
  subway:   new THREE.MeshStandardMaterial({ map: tlColor, normalMap: tlNormal, roughnessMap: tlRough, roughness: 0.4, metalness: 0.0 }),
  vidro:    new THREE.MeshPhysicalMaterial({ color: 0x9abfe0, roughness: 0.05, metalness: 0, transparent: true, opacity: 0.22 }),
  cooktop:  new THREE.MeshStandardMaterial({ color: 0x0d0d0d, roughness: 0.2, metalness: 0.6 }),
  cromado:  new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.05, metalness: 0.95 }),
  friso:    new THREE.MeshStandardMaterial({ color: 0x8a8d90, roughness: 0.35, metalness: 0.8 }),   // perfil puxador embutido
  soco:     new THREE.MeshStandardMaterial({ color: 0x6f6f6d, roughness: 0.6, metalness: 0.1 }),    // rodapé recuado
  hood:     new THREE.MeshStandardMaterial({ color: 0x1a1a1c, roughness: 0.15, metalness: 0.3 }),   // vidro escuro da coifa
  chair:    new THREE.MeshStandardMaterial({ color: 0x4a4d52, roughness: 0.6, metalness: 0.1 }),
  chairLeg: new THREE.MeshStandardMaterial({ color: 0x2e3033, roughness: 0.5, metalness: 0.4 }),
};
MAT.ilha = MAT.bancada;

// ---------- Helpers ----------
function box(mat, w, h, d, x, y, z, cast = true) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z); m.castShadow = cast; m.receiveShadow = true;
  scene.add(m); return m;
}
function cyl(mat, rt, rb, h, seg, x, y, z, cast = true) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat);
  m.position.set(x, y, z); m.castShadow = cast; m.receiveShadow = true;
  scene.add(m); return m;
}
// Frisos de puxador embutido (rasgo raso nivelado com a face)
function frisoZ(cx, y, len, faceZ) { return box(MAT.friso, len, 0.02, 0.012, cx, y, faceZ, false); }   // corre em X
function frisoX(cz, y, len, faceX) { return box(MAT.friso, 0.012, 0.02, len, faceX, y, cz, false); }    // corre em Z
function frisoV(cz, yc, hlen, faceX) { return box(MAT.friso, 0.012, hlen, 0.02, faceX, yc, cz, false); } // vertical (geladeira)

// ---------- Cômodo (SEM parede da frente — aberta para a câmera) ----------
const W = 3.5, D = 4.0, H = 2.6;   // pé-direito ~2.6m

const piso = new THREE.Mesh(new THREE.PlaneGeometry(W, D), MAT.piso);
piso.rotation.x = -Math.PI / 2; piso.receiveShadow = true; scene.add(piso);

const teto = new THREE.Mesh(new THREE.PlaneGeometry(W, D), MAT.teto);
teto.rotation.x = Math.PI / 2; teto.position.y = H; teto.receiveShadow = true; scene.add(teto);

// ---------- Dimensões base ----------
const CT_TOP = 0.9;                 // superfície do tampo a 90cm
const BASE_H = 0.86, TAMPO = 0.04, BANCA_D = 0.6, SOCO_H = 0.1;
const ARM_D = 0.35, ARM_H = 0.8, ARM_Y = 1.5;   // superiores de 1.5m a 2.3m

const wallBack  = -D/2 + 0.04;   // -1.96
const wallLeft  = -W/2 + 0.04;   // -1.71
const wallRight =  W/2 - 0.04;   //  1.71
const backZ  = wallBack  + BANCA_D/2;   // -1.66
const leftX  = wallLeft  + BANCA_D/2;   // -1.41
const rightX = wallRight - BANCA_D/2;   //  1.41
const leftInner  = leftX  + BANCA_D/2;  // -1.11
const rightInner = rightX - BANCA_D/2;  //  1.11
const backFace  = backZ + BANCA_D/2 + 0.006;   // face frontal do run do fundo
const leftFace  = leftX + BANCA_D/2 + 0.006;   // face frontal do run esquerdo
const rightFace = rightX - BANCA_D/2 - 0.006;  // face frontal do run direito

// ---------- Janela larga horizontal (fundo, centralizada sobre a pia) ----------
const JX = 0, JY = 1.4, JW = 2.2, JH = 0.8;   // 2.2×0.8 (~2.75:1)
const jB = JY - JH/2, jT = JY + JH/2;          // 1.0 .. 1.8

// parede do fundo em segmentos — deixa o vão da janela aberto
box(MAT.parede, W, jB, 0.08, 0, jB/2, -D/2, false);                       // abaixo
box(MAT.parede, W, H - jT, 0.08, 0, (jT + H)/2, -D/2, false);             // acima
box(MAT.parede, W/2 - JW/2, JH, 0.08, (-W/2 - JW/2)/2, JY, -D/2, false);  // esq da janela
box(MAT.parede, W/2 - JW/2, JH, 0.08, ( W/2 + JW/2)/2, JY, -D/2, false);  // dir da janela
box(MAT.parede, 0.08, H, D, -W/2, H/2, 0, false);   // parede esquerda
box(MAT.parede, 0.08, H, D,  W/2, H/2, 0, false);   // parede direita

// vegetação lá fora (planos claros — "brilham" de dia)
const gA = new THREE.Mesh(new THREE.PlaneGeometry(3.0, 1.8), new THREE.MeshBasicMaterial({ color: 0xbfe0a0 }));
gA.position.set(JX, JY + 0.1, wallBack - 1.2); scene.add(gA);
const gB = new THREE.Mesh(new THREE.PlaneGeometry(2.8, 0.9), new THREE.MeshBasicMaterial({ color: 0x7aa85f }));
gB.position.set(JX, JY - 0.25, wallBack - 0.7); scene.add(gB);
const gC = new THREE.Mesh(new THREE.PlaneGeometry(2.8, 0.4), new THREE.MeshBasicMaterial({ color: 0x4f7d42 }));
gC.position.set(JX, JY - 0.45, wallBack - 0.4); scene.add(gC);

// moldura fina cinza (alumínio) + vidro + divisão central (2 folhas)
box(MAT.friso, JW + 0.1, JH + 0.1, 0.05, JX, JY, wallBack + 0.02);
box(MAT.vidro, JW, JH, 0.02, JX, JY, wallBack + 0.04);
box(MAT.friso, 0.035, JH, 0.02, JX, JY, wallBack + 0.05);   // montante central vertical

// ---------- Bancada em U (fundo + esquerda + direita) ----------
// Perna do FUNDO (pia sob a janela)
const backW = rightInner - leftInner;               // 2.22
box(MAT.armario, backW, BASE_H - 0.08, BANCA_D, 0, 0.08 + (BASE_H - 0.08)/2, backZ);
box(MAT.soco, backW, SOCO_H, BANCA_D - 0.14, 0, SOCO_H/2, backZ, false);
box(MAT.bancada, backW + 0.02, TAMPO, BANCA_D + 0.02, 0, BASE_H + TAMPO/2, backZ + 0.01);

// Perna ESQUERDA (coluna forno/micro no fundo + cooktop à frente)
const cooktopZ0 = -1.34, leftRunZ1 = 0.2;
const cookBaseCZ = (cooktopZ0 + leftRunZ1) / 2;     // -0.57
const cookBaseLen = leftRunZ1 - cooktopZ0;          //  1.54
box(MAT.armario, BANCA_D, BASE_H - 0.08, cookBaseLen, leftX, 0.08 + (BASE_H - 0.08)/2, cookBaseCZ);
box(MAT.soco, BANCA_D - 0.14, SOCO_H, cookBaseLen, leftX, SOCO_H/2, cookBaseCZ, false);
box(MAT.bancada, BANCA_D + 0.02, TAMPO, cookBaseLen + 0.02, leftX, BASE_H + TAMPO/2, cookBaseCZ);

// Perna DIREITA (geladeira no fundo + bancada à frente)
const fridgeZ1 = -1.16;
const rightBaseCZ = (fridgeZ1 + 0.2) / 2;           // -0.48
const rightBaseLen = 0.2 - fridgeZ1;                //  1.36
box(MAT.armario, BANCA_D, BASE_H - 0.08, rightBaseLen, rightX, 0.08 + (BASE_H - 0.08)/2, rightBaseCZ);
box(MAT.soco, BANCA_D - 0.14, SOCO_H, rightBaseLen, rightX, SOCO_H/2, rightBaseCZ, false);
box(MAT.bancada, BANCA_D + 0.02, TAMPO, rightBaseLen + 0.02, rightX, BASE_H + TAMPO/2, rightBaseCZ);

// Frisos das bases (na borda SUPERIOR das gavetas/portas)
frisoZ(-0.55, 0.80, 0.8, backFace); frisoZ(0.55, 0.80, 0.8, backFace);
[[-0.95, 0.35], [-0.4, 0.5], [0.05, 0.2]].forEach(([cz, l]) => frisoX(cz, 0.80, l, leftFace));
[[-0.85, 0.4], [-0.25, 0.5], [0.05, 0.2]].forEach(([cz, l]) => frisoX(cz, 0.80, l, rightFace));

// ---------- Armários superiores (1.5 a 2.3m) ----------
box(MAT.armario, ARM_D, ARM_H, cookBaseLen, wallLeft + ARM_D/2, ARM_Y + ARM_H/2, cookBaseCZ);    // esquerda
box(MAT.armario, ARM_D, ARM_H, rightBaseLen, wallRight - ARM_D/2, ARM_Y + ARM_H/2, rightBaseCZ); // direita
box(MAT.armario, JW, 0.45, ARM_D, JX, 2.075, wallBack + ARM_D/2);                                // fileira sobre a janela
// frisos dos superiores (na borda INFERIOR)
frisoX(cookBaseCZ, 1.55, cookBaseLen - 0.3, wallLeft + ARM_D + 0.006);
frisoX(rightBaseCZ, 1.55, rightBaseLen - 0.3, wallRight - ARM_D - 0.006);
frisoZ(JX, 1.90, JW - 0.3, wallBack + ARM_D + 0.006);

// ---------- Backsplash (subway) — só na faixa entre bancada e superiores + moldura da janela ----------
box(MAT.subway, backW, 0.1, 0.02, 0, 0.95, wallBack + 0.01);                       // faixa sob a janela
box(MAT.subway, 0.02, 0.6, cookBaseLen, wallLeft + 0.01, 1.2, cookBaseCZ);         // parede esquerda
box(MAT.subway, 0.02, 0.6, rightBaseLen, wallRight - 0.01, 1.2, rightBaseCZ);      // parede direita

// ---------- Cooktop embutido (perna esquerda) ----------
const ckX = leftX, ckZ = -0.55;
const ck = new THREE.Mesh(new THREE.PlaneGeometry(0.44, 0.70), MAT.cooktop);
ck.rotation.x = -Math.PI/2; ck.position.set(ckX, 0.906, ckZ); ck.receiveShadow = true; scene.add(ck);
[[-0.1, -0.17], [0.1, -0.17], [-0.1, 0.17], [0.1, 0.17]].forEach(([bx, bz]) =>
  cyl(new THREE.MeshPhysicalMaterial({ color: 0x2a2a2a, roughness: 0.15, metalness: 0.7 }), 0.06, 0.06, 0.006, 24, ckX + bx, 0.909, ckZ + bz));

// ---------- Coifa inclinada slim (vidro escuro + chaminé inox) ----------
const hoodBorder = box(MAT.inox, 0.09, 0.5, 0.64, wallLeft + 0.15, 1.78, ckZ);
hoodBorder.rotation.z = 0.55;                                          // ~31° encostando na parede
const hoodPanel = box(MAT.hood, 0.05, 0.42, 0.56, wallLeft + 0.2, 1.76, ckZ);
hoodPanel.rotation.z = 0.55;
box(MAT.inox, 0.14, H - 1.98, 0.16, wallLeft + 0.09, (1.98 + H)/2, ckZ);   // chaminé até o teto

// ---------- Pia (cuba inox + torneira cromada) sob a janela ----------
const PX = 0;
box(new THREE.MeshPhysicalMaterial({ color: 0x9fa3a6, roughness: 0.18, metalness: 0.85 }),
    0.60, 0.012, 0.44, PX, CT_TOP + TAMPO/2 - 0.014, backZ);
box(new THREE.MeshPhysicalMaterial({ color: 0x74787b, roughness: 0.25, metalness: 0.8 }),
    0.52, 0.13, 0.34, PX, CT_TOP - 0.08, backZ);
cyl(MAT.cromado, 0.014, 0.014, 0.28, 12, PX, CT_TOP + 0.14, backZ - 0.16);
const bica = cyl(MAT.cromado, 0.011, 0.011, 0.18, 12, PX, CT_TOP + 0.27, backZ - 0.08);
bica.rotation.x = Math.PI / 2;

// ---------- Geladeira embutida em nicho de marcenaria (parede direita) ----------
const frDepthX = 0.72, frWidthZ = 0.80, frH = 2.05;
const frCX = wallRight - frDepthX/2;                 //  1.35
const frCZ = wallBack + frWidthZ/2 + 0.02;           // -1.54
// nicho: painéis laterais brancos + armário raso por cima (alinhado aos módulos)
box(MAT.armario, frDepthX + 0.06, frH + 0.25, 0.05, frCX + 0.03, (frH + 0.25)/2, frCZ - frWidthZ/2 - 0.03);
box(MAT.armario, frDepthX + 0.06, frH + 0.25, 0.05, frCX + 0.03, (frH + 0.25)/2, frCZ + frWidthZ/2 + 0.03);
box(MAT.armario, frDepthX + 0.06, 0.24, frWidthZ + 0.12, frCX + 0.03, frH + 0.13, frCZ);
// corpo inox + portas French + gaveta freezer
box(MAT.inox, frDepthX, frH, frWidthZ, frCX, frH/2, frCZ);
const frFront = frCX - frDepthX/2;                   // 0.99
box(MAT.inox, 0.03, 0.66, frWidthZ - 0.05, frFront - 0.015, 0.42, frCZ);
box(MAT.inox, 0.03, 1.18, frWidthZ/2 - 0.04, frFront - 0.015, 1.45, frCZ - frWidthZ/4);
box(MAT.inox, 0.03, 1.18, frWidthZ/2 - 0.04, frFront - 0.015, 1.45, frCZ + frWidthZ/4);
// frisos verticais (borda das portas) + freezer
frisoV(frCZ - 0.04, 1.5, 1.05, frFront - 0.02);
frisoV(frCZ + 0.04, 1.5, 1.05, frFront - 0.02);
box(MAT.friso, 0.012, 0.02, 0.5, frFront - 0.02, 0.74, frCZ, false);

// ---------- Coluna forno + micro-ondas (parede esquerda, canto do fundo) ----------
const colDepthX = 0.66, colWidthZ = 0.62, colH = 2.3;
const colCX = wallLeft + colDepthX/2;   // -1.38
const colCZ = wallBack + colWidthZ/2;   // -1.65
box(MAT.armario, colDepthX, colH, colWidthZ, colCX, colH/2, colCZ);
const colFront = colCX + colDepthX/2 - 0.01;
box(MAT.eletro, 0.05, 0.40, colWidthZ - 0.10, colFront, 1.72, colCZ);            // micro-ondas
box(MAT.eletro, 0.05, 0.55, colWidthZ - 0.10, colFront, 1.18, colCZ);            // forno
box(MAT.inox, 0.06, 0.44, colWidthZ - 0.06, colFront - 0.01, 1.72, colCZ);       // moldura inox micro
box(MAT.inox, 0.06, 0.59, colWidthZ - 0.06, colFront - 0.01, 1.18, colCZ);       // moldura inox forno
box(MAT.armario, 0.03, 0.30, colWidthZ - 0.06, colFront + 0.005, 2.12, colCZ);   // armário superior
[0.70, 0.46, 0.22].forEach(dy => box(MAT.armario, 0.03, 0.18, colWidthZ - 0.06, colFront + 0.005, dy, colCZ));  // gavetas
// frisos da coluna (superior + gavetas)
frisoX(colCZ, 1.98, 0.42, colFront + 0.02);
[0.80, 0.56, 0.32].forEach(dy => frisoX(colCZ, dy, 0.42, colFront + 0.02));

// ---------- Ilha: bloco sólido monolítico de mármore (cachoeira nas 2 laterais) ----------
const isX = 0, isZ = 0.4, isW = 1.3, isD = 0.9;
box(MAT.ilha, isW, CT_TOP, isD, isX, CT_TOP/2, isZ);                              // bloco maciço até o chão
box(MAT.ilha, isW, TAMPO, 0.3, isX, CT_TOP - TAMPO/2, isZ + isD/2 + 0.15);        // balanço ~30cm (lado das cadeiras)

// ---------- Cadeiras altas com encosto (2, viradas pra ilha) ----------
[-0.32, 0.32].forEach(cx => {
  const cz = 1.02;
  box(MAT.chair, 0.42, 0.06, 0.40, cx, 0.65, cz);                                 // assento
  const back = box(MAT.chair, 0.42, 0.42, 0.05, cx, 0.86, cz + 0.17);             // encosto
  back.rotation.x = 0.12;                                                         // leve inclinação
  [[-0.17, -0.16], [0.17, -0.16], [-0.17, 0.16], [0.17, 0.16]].forEach(([lx, lz]) => {
    const leg = cyl(MAT.chairLeg, 0.011, 0.015, 0.63, 8, cx + lx, 0.315, cz + lz);
    leg.rotation.x = lz > 0 ? -0.05 : 0.05;
    leg.rotation.z = lx > 0 ? 0.05 : -0.05;
  });
});

// ---------- Iluminação quente (~3000K) ----------
const amb = new THREE.AmbientLight(0xfff1e0, 0.5);
scene.add(amb);

// Luz do dia fria entrando pela janela
const day = new THREE.DirectionalLight(0xdfe8ff, 1.4);
day.position.set(-1, 3, -6); day.castShadow = true;
day.target.position.set(0, 0.8, -1);
day.shadow.mapSize.set(1024, 1024); day.shadow.bias = -0.0005;
day.shadow.camera.near = 0.5; day.shadow.camera.far = 16;
day.shadow.camera.left = -4; day.shadow.camera.right = 4;
day.shadow.camera.top = 4; day.shadow.camera.bottom = -2;
scene.add(day); scene.add(day.target);

// Spots embutidos (discos pretos ~8cm) alinhados sobre as bancadas — 4 com sombra (esquinas)
const SPOTS = [
  { x: -1.4, z: -1.3, shadow: true },
  { x:  1.4, z: -1.3, shadow: true },
  { x: -1.4, z:  0.1, shadow: true },
  { x:  1.4, z:  0.1, shadow: true },
  { x: -0.6, z: -1.5, shadow: false },
  { x:  0.0, z: -1.5, shadow: false },
  { x:  0.6, z: -1.5, shadow: false },
  { x:  0.0, z: -0.5, shadow: false },
];
SPOTS.forEach(s => {
  const ring = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.012, 20),
    new THREE.MeshStandardMaterial({ color: 0x141414, roughness: 0.4, metalness: 0.6 }));
  ring.position.set(s.x, H - 0.006, s.z); scene.add(ring);
  const lens = new THREE.Mesh(new THREE.CylinderGeometry(0.036, 0.036, 0.014, 20),
    new THREE.MeshStandardMaterial({ color: 0xfff2dc, emissive: 0xffcf95, emissiveIntensity: 1.3 }));
  lens.position.set(s.x, H - 0.009, s.z); scene.add(lens);
  const sl = new THREE.SpotLight(0xffd9b3, s.shadow ? 42 : 26, 8, Math.PI/5, 0.5, 2);
  sl.position.set(s.x, H - 0.05, s.z);
  sl.target.position.set(s.x, 0, s.z);
  if (s.shadow) { sl.castShadow = true; sl.shadow.mapSize.set(1024, 1024); sl.shadow.bias = -0.0005; }
  scene.add(sl); scene.add(sl.target);
});

// Luminária central quadrada (~60cm) + PointLight quente
const lum = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.6), new THREE.MeshBasicMaterial({ color: 0xfff2dc }));
lum.rotation.x = Math.PI/2; lum.position.set(0, H - 0.008, 0.4); scene.add(lum);
box(MAT.friso, 0.66, 0.02, 0.66, 0, H - 0.02, 0.4, false);
const lumLight = new THREE.PointLight(0xffe6c2, 14, 6, 2);
lumLight.position.set(0, H - 0.12, 0.4); scene.add(lumLight);

// ---------- Loop ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
document.getElementById('loading').style.opacity = '0';
setTimeout(() => document.getElementById('loading').style.display = 'none', 600);
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
