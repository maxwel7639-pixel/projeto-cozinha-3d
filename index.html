<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Cozinha 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #ui {
    position: absolute; top: 20px; left: 20px;
    color: white; pointer-events: none;
  }
  #ui h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
  #ui p { font-size: 11px; opacity: 0.6; margin-top: 4px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
  #loading {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    background: #111; color: #ccc; font-size: 14px;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>
<div id="loading">Carregando cozinha 3D…</div>
<div id="ui">
  <h1>Projeto Cozinha — Visualização 3D</h1>
  <p>Arraste para girar · Scroll para zoom · Clique direito para mover</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.physicallyCorrectLights = true;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.05, 50);
camera.position.set(3.8, 2.2, 3.8);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.9, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.0;
controls.maxDistance = 9;
controls.maxPolarAngle = Math.PI * 0.55;
controls.update();

function makeMarbleTexture(w, h, baseColor, veinColor, veinCount) {
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.fillStyle = baseColor; ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < veinCount; i++) {
    ctx.beginPath();
    const sx = Math.random() * w, sy = Math.random() * h;
    ctx.moveTo(sx, sy);
    for (let j = 0; j < 5; j++) {
      ctx.bezierCurveTo(Math.random()*w,Math.random()*h,Math.random()*w,Math.random()*h,Math.random()*w,Math.random()*h);
    }
    ctx.strokeStyle = veinColor;
    ctx.lineWidth = 0.5 + Math.random() * 2;
    ctx.globalAlpha = 0.35 + Math.random() * 0.3;
    ctx.stroke(); ctx.globalAlpha = 1;
  }
  const tex = new THREE.CanvasTexture(c);
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}

function makeFloorTexture() {
  const c = document.createElement('canvas'); c.width = 1024; c.height = 1024;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#f2eeea'; ctx.fillRect(0, 0, 1024, 1024);
  for (let i = 0; i < 18; i++) {
    ctx.beginPath();
    ctx.moveTo(Math.random()*1024, Math.random()*1024);
    for (let j = 0; j < 6; j++) {
      ctx.bezierCurveTo(Math.random()*1024,Math.random()*1024,Math.random()*1024,Math.random()*1024,Math.random()*1024,Math.random()*1024);
    }
    ctx.strokeStyle = `rgba(${130+Math.random()*40},${30+Math.random()*30},${30+Math.random()*20},${0.3+Math.random()*0.35})`;
    ctx.lineWidth = 1 + Math.random() * 3; ctx.stroke();
  }
  ctx.strokeStyle = '#d0ccc8'; ctx.lineWidth = 3; ctx.globalAlpha = 0.5;
  for (let x = 0; x <= 1024; x += 256) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,1024); ctx.stroke(); }
  for (let y = 0; y <= 1024; y += 256) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(1024,y); ctx.stroke(); }
  ctx.globalAlpha = 1;
  const tex = new THREE.CanvasTexture(c);
  tex.encoding = THREE.sRGBEncoding;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(5, 6);
  return tex;
}

function makeSubwayTileTexture() {
  const c = document.createElement('canvas'); c.width = 256; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#d5d0cc'; ctx.fillRect(0, 0, 256, 128);
  ctx.strokeStyle = '#b0aba8'; ctx.lineWidth = 2;
  for (let row = 0; row < 4; row++) {
    const offset = (row % 2) * 64;
    for (let col = -1; col < 5; col++) {
      ctx.strokeRect(col*128+offset+2, row*32+2, 124, 28);
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4, 2);
  return tex;
}

const MAT = {
  armario: new THREE.MeshPhysicalMaterial({ color: 0xf0efed, roughness: 0.22, metalness: 0.0, clearcoat: 0.7, clearcoatRoughness: 0.08 }),
  bancada: new THREE.MeshPhysicalMaterial({ map: makeMarbleTexture(512,512,'#f5f1ec','rgba(160,140,110,0.4)',14), roughness: 0.08, metalness: 0.0, clearcoat: 1.0, clearcoatRoughness: 0.04 }),
  ilha: new THREE.MeshPhysicalMaterial({ map: makeMarbleTexture(512,512,'#f3efea','rgba(150,130,100,0.45)',16), roughness: 0.08, metalness: 0.0, clearcoat: 1.0, clearcoatRoughness: 0.04 }),
  inox: new THREE.MeshPhysicalMaterial({ color: 0xb8bcbf, roughness: 0.14, metalness: 0.92 }),
  piso: new THREE.MeshPhysicalMaterial({ map: makeFloorTexture(), roughness: 0.04, metalness: 0.0, clearcoat: 0.9, clearcoatRoughness: 0.02 }),
  parede: new THREE.MeshPhysicalMaterial({ color: 0xf8f7f5, roughness: 0.88, metalness: 0.0 }),
  teto: new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.92, metalness: 0.0 }),
  escuro: new THREE.MeshPhysicalMaterial({ color: 0x1c1c1c, roughness: 0.28, metalness: 0.55 }),
  vidro: new THREE.MeshPhysicalMaterial({ color: 0x9abfe0, roughness: 0.05, metalness: 0.0, transparent: true, opacity: 0.3 }),
  banqueta: new THREE.MeshPhysicalMaterial({ color: 0x444444, roughness: 0.55, metalness: 0.2 }),
  subway: new THREE.MeshPhysicalMaterial({ map: makeSubwayTileTexture(), roughness: 0.4, metalness: 0.05 }),
  grade: new THREE.MeshPhysicalMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.7 }),
  puxador: new THREE.MeshPhysicalMaterial({ color: 0x9a9a9a, roughness: 0.1, metalness: 0.95 }),
  cooktop: new THREE.MeshPhysicalMaterial({ color: 0x0d0d0d, roughness: 0.2, metalness: 0.6 }),
};

function box(mat, w, h, d, x, y, z, cast=true) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z); m.castShadow=cast; m.receiveShadow=true; scene.add(m); return m;
}
function cyl(mat, rt, rb, h, seg, x, y, z, cast=true) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg), mat);
  m.position.set(x,y,z); m.castShadow=cast; m.receiveShadow=true; scene.add(m); return m;
}

const W=3.5, D=4.0, H=2.7;
const piso = new THREE.Mesh(new THREE.PlaneGeometry(W,D), MAT.piso);
piso.rotation.x=-Math.PI/2; piso.receiveShadow=true; scene.add(piso);
const teto = new THREE.Mesh(new THREE.PlaneGeometry(W,D), MAT.teto);
teto.rotation.x=Math.PI/2; teto.position.y=H; scene.add(teto);
box(MAT.parede,W,H,0.08,0,H/2,-D/2,false);
box(MAT.parede,0.08,H,D,-W/2,H/2,0,false);
box(MAT.parede,0.08,H,D,W/2,H/2,0,false);
box(MAT.parede,W,H,0.08,0,H/2,D/2,false);

const BANCA_H=0.9,BANCA_D=0.6,ARM_H=0.72,ARM_D=0.35,ARM_Y=1.5,TAMPO=0.04;
box(MAT.armario,W-0.1,BANCA_H,BANCA_D,0,BANCA_H/2,-D/2+BANCA_D/2+0.05);
box(MAT.bancada,W-0.08,TAMPO,BANCA_D+0.02,0,BANCA_H+TAMPO/2,-D/2+BANCA_D/2+0.05);
box(MAT.armario,W-0.1,ARM_H,ARM_D,0,ARM_Y+ARM_H/2,-D/2+ARM_D/2+0.05);

const LEN=1.4;
box(MAT.armario,BANCA_D,BANCA_H,LEN,W/2-BANCA_D/2-0.05,BANCA_H/2,-D/2+LEN/2+0.05);
box(MAT.bancada,BANCA_D+0.02,TAMPO,LEN,W/2-BANCA_D/2-0.05,BANCA_H+TAMPO/2,-D/2+LEN/2+0.05);
box(MAT.armario,ARM_D,ARM_H,LEN,W/2-ARM_D/2-0.05,ARM_Y+ARM_H/2,-D/2+LEN/2+0.05);

box(MAT.subway,W-0.12,ARM_Y-BANCA_H-TAMPO-0.02,0.02,0,BANCA_H+TAMPO+(ARM_Y-BANCA_H-TAMPO)/2,-D/2+0.06);
box(MAT.subway,0.02,ARM_Y-BANCA_H-TAMPO-0.02,LEN-0.1,W/2-0.07,BANCA_H+TAMPO+(ARM_Y-BANCA_H-TAMPO)/2,-D/2+LEN/2+0.05);

for(let xi=-1.5;xi<=1.5;xi+=0.5){
  const p=cyl(MAT.puxador,0.008,0.008,0.25,8,xi,BANCA_H-0.08,-D/2+BANCA_D+0.07);
  p.rotation.z=Math.PI/2;
}

box(MAT.armario,0.96,0.56,0.08,0,1.55,-D/2+0.05);
box(MAT.vidro,0.9,0.5,0.03,0,1.55,-D/2+0.06);
for(let gx=-0.32;gx<=0.36;gx+=0.16){
  cyl(MAT.grade,0.008,0.008,0.46,8,gx,1.55,-D/2+0.075);
}

const GX=-W/2+0.38,GZ=-D/2+0.4;
box(MAT.inox,0.75,1.95,0.72,GX,1.95/2,GZ);
box(MAT.inox,0.03,0.5,0.03,GX+0.3,1.4,GZ-0.38);
box(new THREE.MeshPhysicalMaterial({color:0x666666,roughness:0.2,metalness:0.8}),0.72,0.015,0.68,GX,0.82,GZ);

const CX=-W/2+0.35,CZ=-D/2+1.4;
box(MAT.armario,0.65,H-0.1,0.62,CX,(H-0.1)/2,CZ);
box(MAT.escuro,0.55,0.42,0.52,CX,1.82,CZ);
box(MAT.inox,0.54,0.01,0.51,CX,1.82+0.21,CZ);
box(MAT.escuro,0.55,0.5,0.52,CX,1.15,CZ);
box(MAT.inox,0.54,0.01,0.51,CX,1.15+0.25,CZ);
box(MAT.inox,0.35,0.02,0.025,CX,1.82+0.15,CZ-0.28);
box(MAT.inox,0.35,0.02,0.025,CX,1.15+0.18,CZ-0.28);

const TX=-0.55,TZ=-D/2+BANCA_D/2+0.05;
box(MAT.cooktop,0.72,0.02,0.48,TX,BANCA_H+TAMPO+0.005,TZ);
[[-0.17,-0.1],[0.17,-0.1],[-0.17,0.1],[0.17,0.1]].forEach(([bx,bz])=>{
  cyl(new THREE.MeshPhysicalMaterial({color:0x222222,roughness:0.1,metalness:0.7}),0.065,0.065,0.01,16,TX+bx,BANCA_H+TAMPO+0.016,TZ+bz);
});
box(MAT.inox,0.75,0.14,0.4,TX,ARM_Y+0.07,TZ);
box(MAT.inox,0.18,ARM_H-0.14,0.18,TX,ARM_Y+0.14+(ARM_H-0.14)/2,TZ);

box(new THREE.MeshPhysicalMaterial({color:0x999999,roughness:0.15,metalness:0.7}),0.55,0.02,0.42,0.6,BANCA_H+TAMPO/2,-D/2+0.32);
box(new THREE.MeshPhysicalMaterial({color:0x888888,roughness:0.1,metalness:0.8}),0.44,0.14,0.35,0.6,BANCA_H-0.07+TAMPO,-D/2+0.3);
cyl(MAT.inox,0.012,0.012,0.18,8,0.6,BANCA_H+TAMPO+0.09,-D/2+0.22);

box(MAT.armario,1.25,0.9,0.75,0,0.45,0.65);
box(MAT.ilha,1.32,0.045,0.82,0,0.922,0.65);
[-0.38,0.38].forEach(bx=>{
  cyl(MAT.banqueta,0.16,0.16,0.04,24,bx,1.07,1.17);
  cyl(MAT.puxador,0.015,0.015,0.2,8,bx,0.96,1.17);
  cyl(MAT.puxador,0.12,0.12,0.02,24,bx,0.88,1.17);
});

[[-1,-1.2],[-1,0.2],[-1,1.4],[0.7,-1.2],[0.7,0.2],[0.7,1.4]].forEach(([sx,sz])=>{
  cyl(new THREE.MeshPhysicalMaterial({color:0x222222,roughness:0.3}),0.055,0.055,0.025,16,sx,H-0.013,sz,false);
  const pl=new THREE.PointLight(0xfff7e8,0.55,3.8,2);
  pl.position.set(sx,H-0.06,sz); scene.add(pl);
});

scene.add(new THREE.HemisphereLight(0xffffff,0xf0ece6,0.38));
const sun=new THREE.DirectionalLight(0xfff9f0,0.95);
sun.position.set(-0.5,3,-3.5); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=0.1; sun.shadow.camera.far=14;
sun.shadow.camera.left=-4; sun.shadow.camera.right=4;
sun.shadow.camera.top=4; sun.shadow.camera.bottom=-4;
sun.shadow.radius=3; sun.shadow.bias=-0.001; scene.add(sun);
const fill=new THREE.DirectionalLight(0xe8f0ff,0.22);
fill.position.set(2,1.5,3); scene.add(fill);

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
document.getElementById('loading').style.opacity='0';
setTimeout(()=>document.getElementById('loading').style.display='none',600);
function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
animate();
</script>
</body>
</html>
